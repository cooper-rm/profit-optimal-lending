name: credit-signal
channels:
  - conda-forge
dependencies:
  - python=3.11
  # core data stack (pandas pinned <3: ydata-profiling requires it)
  - pandas<3
  - numpy
  - scikit-learn
  - setuptools<81   # ydata-profiling needs pkg_resources, dropped in setuptools 81+
  # viz
  - matplotlib
  - seaborn
  # modeling / feature selection
  - lightgbm
  - xgboost
  - catboost
  - shap
  - optuna
  - pytorch
  # notebooks
  - jupyterlab
  - ipykernel
  # auto-EDA (pip: pins pandas<3, not usable with pandas 3)
  - pip
  - pip:
      - ydata-profiling
